name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    # Use Node.js 22 (since Node 20 is deprecated)
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # 🔧 Create a fresh test database (SQLite)
      - name: Set up test database
        run: |
          touch test.db
          echo "DATABASE_URL=file:./test.db" >> $GITHUB_ENV

      # 🔧 Run migrations on the fresh database
      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: file:./test.db

      # 🔧 Optionally seed if needed (uncomment if you have seed script)
      # - name: Seed database
      #   run: npx prisma db seed
      #   env:
      #     DATABASE_URL: file:./test.db

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-key' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'dummy-key' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || 'dummy-token' }}